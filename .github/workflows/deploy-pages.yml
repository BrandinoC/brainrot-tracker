name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site bundle
        run: |
          ASSET_V=$(grep 'name="asset-version"' index.html | sed -n 's/.*content="\([^"]*\)".*/\1/p')
          mkdir _site
          sed "s|href=\"styles.css\"|href=\"styles.css?v=${ASSET_V}\"|; s|src=\"app.js\"|src=\"app.js?v=${ASSET_V}\"|" index.html > _site/index.html
          cp app.js styles.css catalog-data.js types-data.js traits-data.js version.json .nojekyll _site/
          cp -r data _site/
          mkdir -p _site/electron
          cp electron/icon.png _site/electron/
          cp rotvault-thumbnail.png rotvault-promo.png _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
