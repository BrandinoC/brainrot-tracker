name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site bundle
        run: |
          mkdir _site
          cp index.html app.js styles.css catalog-data.js types-data.js traits-data.js version.json .nojekyll _site/
          cp -r data _site/
          mkdir -p _site/electron
          cp electron/icon.png _site/electron/
          cp rotvault-thumbnail.png rotvault-promo.png _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Verify deployment succeeded
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: |
          echo "GitHub Pages deploy failed after retry. Re-run the workflow from the Actions tab."
          exit 1
